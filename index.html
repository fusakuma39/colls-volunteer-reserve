<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生ボランティア予約システム</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        student: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488' },
                        teacher: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    },
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .sticky-top { position: sticky; top: 0; z-index: 20; }
        .sticky-left { position: sticky; left: 0; z-index: 20; background-color: white; }
        .sticky-corner { position: sticky; top: 0; left: 0; z-index: 30; background-color: #f8fafc; }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        
        input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        input[type="time"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

        /* ================================
           ★ 印刷（PDF保存）専用のスタイル
           ================================ */
        @media print {
            @page { 
                size: A4 portrait; /* A4縦向きに指定 */
                margin: 15mm; 
            }
            body { 
                background-color: #ffffff !important; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // ↓↓↓ GASのウェブアプリURLをここに貼り付けます ↓↓↓
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbz4rLEKB4PLxqpOm0ZcyyIw9QmsalJt-Rssss0a1BZ50_Hj_hzShxl3dxAvUzzZE62-/exec"; 
        // ==========================================

        const CLASSES = [
            "1年1組", "1年2組", "2年1組", "2年2組", "3年1組", "3年2組",
            "4年1組", "4年2組", "5年1組", "5年2組", "6年1組", "6年2組",
            "個別1", "個別2", "専科", "その他"
        ];

        const TIMETABLE_PATTERNS = {
            "通常日課": {
                "morning": { name: "登校～朝の会", start: "08:10", end: "08:45" },
                "periods": [
                    { name: "1時間目", start: "08:45", end: "09:30" },
                    { name: "2時間目", start: "09:35", end: "10:20" },
                    { name: "中休み", start: "10:20", end: "10:40" },
                    { name: "3時間目", start: "10:40", end: "11:25" },
                    { name: "4時間目", start: "11:30", end: "12:15" },
                    { name: "給食", start: "12:15", end: "13:00" },
                    { name: "掃除", start: "13:00", end: "13:20" }
                ],
                "afternoon_long": [ 
                    { name: "昼休み", start: "13:20", end: "13:40" },
                    { name: "5時間目", start: "13:40", end: "14:25" },
                    { name: "6時間目", start: "14:30", end: "15:15" },
                    { name: "帰りの会", start: "15:15", end: "15:30" }
                ],
                "afternoon_short": [ 
                    { name: "5時間目", start: "13:20", end: "14:05" },
                    { name: "帰りの会", start: "14:05", end: "15:20" }
                ]
            },
            "短縮時程": [
                { name: "登校～朝の会", start: "08:10", end: "08:30" },
                { name: "1時間目", start: "08:30", end: "09:15" },
                { name: "2時間目", start: "09:20", end: "10:05" },
                { name: "中休み", start: "10:05", end: "10:15" },
                { name: "3時間目", start: "10:15", end: "11:00" },
                { name: "4時間目", start: "11:05", end: "11:50" },
                { name: "給食", start: "11:50", end: "12:40" },
                { name: "帰りの会", start: "12:40", end: "13:00" }
            ],
            "委員会・クラブ": [
                { name: "登校～朝の会", start: "08:10", end: "08:45" },
                { name: "1時間目", start: "08:45", end: "09:30" },
                { name: "2時間目", start: "09:35", end: "10:20" },
                { name: "中休み", start: "10:20", end: "10:40" },
                { name: "3時間目", start: "10:40", end: "11:25" },
                { name: "4時間目", start: "11:30", end: "12:15" },
                { name: "給食", start: "12:15", end: "13:00" },
                { name: "掃除", start: "13:00", end: "13:20" },
                { name: "5時間目", start: "13:20", end: "14:05" },
                { name: "6時間目", start: "14:05", end: "15:15" }
            ]
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const elRef = useRef(null);
            useEffect(() => {
                if (elRef.current && window.lucide.icons[name]) {
                    elRef.current.innerHTML = window.lucide.icons[name].toSvg({ class: className, width: size, height: size });
                }
            }, [name, size, className]);
            return <span ref={elRef} className="inline-flex items-center justify-center" />;
        };

        const checkDateMatch = (sheetDate, targetDateStr) => {
            if (!sheetDate) return false;
            const str = String(sheetDate);
            if (str.includes(targetDateStr)) return true;
            const d = new Date(str);
            if (!isNaN(d.getTime())) {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}` === targetDateStr;
            }
            return false;
        };

        const displayTime = (timeVal) => {
            if (!timeVal) return "";
            const str = String(timeVal);
            if (/^\d{1,2}:\d{2}$/.test(str)) return str;
            const d = new Date(str);
            if (!isNaN(d.getTime())) {
                return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            }
            return str;
        };

        const parseTimeForCompare = (timeVal) => {
            if (!timeVal) return 0;
            const str = String(timeVal);
            let hm = "";
            if (/^\d{1,2}:\d{2}$/.test(str)) {
                hm = str.replace(':', '');
            } else {
                const d = new Date(str);
                if (!isNaN(d.getTime())) {
                    hm = `${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}`;
                } else {
                    hm = str.replace(/[^0-9]/g, '');
                }
            }
            return parseInt(hm.padEnd(4, '0'), 10);
        };

        function App() {
            const [view, setView] = useState('student');
            const [data, setData] = useState({ schedules: [], students: [], reservations: [] });
            const [loading, setLoading] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [modal, setModal] = useState(null);
            const [msg, setMsg] = useState(null); 
            const [studentFilter, setStudentFilter] = useState("");
            
            const [passwordModal, setPasswordModal] = useState(false);
            const [passwordError, setPasswordError] = useState("");
            
            const [confirmStudentReg, setConfirmStudentReg] = useState(null);
            const [confirmAbsent, setConfirmAbsent] = useState(null); 
            const [holidays, setHolidays] = useState({}); 
            
            const studentFormRef = useRef(null);
            const theme = view === 'student' ? 'student' : 'teacher';

            useEffect(() => {
                fetch('https://holidays-jp.github.io/api/v1/date.json')
                    .then(res => res.json())
                    .then(data => setHolidays(data))
                    .catch(e => console.error("祝日取得エラー", e));
            }, []);

            const fetchData = async () => {
                if (!API_URL) return;
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}?mode=student`);
                    const json = await res.json();
                    setData(json);
                    if (data.schedules.length > 0) showMsg("最新データに更新しました");
                } catch (e) {
                    showMsg("データの取得に失敗しました。", "error");
                }
                setLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            const showMsg = (text, type = "success") => {
                setMsg({ text, type });
                setTimeout(() => setMsg(null), 3000);
            };

            const isPeriodAvailable = (student, period) => {
                const sStart = parseTimeForCompare(student.start);
                const sEnd = parseTimeForCompare(student.end);
                const pStart = parseTimeForCompare(period.start);
                const pEnd = parseTimeForCompare(period.end);
                if(sStart === 0 || sEnd === 0) return false;
                return sStart < pEnd && sEnd > pStart;
            };

            const getDailyPeriods = (dateStr) => {
                const manual = [...data.schedules].reverse().find(s => checkDateMatch(s[0], dateStr));
                const d = new Date(dateStr);
                const day = d.getDay();
                const isHoliday = holidays[dateStr] !== undefined;
                
                let patternName = manual ? manual[1] : null;
                if (!patternName) {
                    if (day === 0 || day === 6 || isHoliday) patternName = "休み";
                    else patternName = "通常日課";
                }
                if (patternName === "休み") return [];
                if (patternName !== "通常日課") return TIMETABLE_PATTERNS[patternName] || [];

                const base = TIMETABLE_PATTERNS["通常日課"];
                let periods = [base.morning, ...base.periods];
                if ([1, 2, 4].includes(day)) periods = periods.concat(base.afternoon_long);
                else periods = periods.concat(base.afternoon_short);
                return periods;
            };

            const activePeriods = useMemo(() => getDailyPeriods(selectedDate), [selectedDate, data.schedules, holidays]);
            
            const activeStudents = useMemo(() => {
                const absentStudentNames = data.reservations
                    .filter(r => checkDateMatch(r[0], selectedDate) && r[1] === 'ABSENT' && r[3] === 'ABSENT')
                    .map(r => r[2]);
                return data.students.filter(s => 
                    checkDateMatch(s[2], selectedDate) && !absentStudentNames.includes(s[0])
                );
            }, [selectedDate, data.students, data.reservations]);

            const handlePost = async (payload) => {
                if (!API_URL) {
                    showMsg("API URLが設定されていません。", "error");
                    return;
                }
                
                const previousData = { ...data };
                setData(prevData => {
                    let newData = { 
                        schedules: [...prevData.schedules], 
                        students: [...prevData.students], 
                        reservations: [...prevData.reservations] 
                    };

                    if (payload.type === 'reg_student') {
                        newData.students.push([payload.name, payload.email, payload.date, payload.start, payload.end]);
                    } else if (payload.type === 'reserve') {
                        newData.reservations = newData.reservations.filter(r => !(checkDateMatch(r[0], payload.date) && r[1] === payload.periodName && r[2] === payload.studentName));
                        if (payload.className !== 'CANCELLED') {
                            newData.reservations.push([payload.date, payload.periodName, payload.studentName, payload.className, payload.note]);
                        }
                    } else if (payload.type === 'set_schedule') {
                        newData.schedules = newData.schedules.filter(s => !checkDateMatch(s[0], payload.date));
                        newData.schedules.push([payload.date, payload.pattern]);
                    }
                    return newData;
                });

                setModal(null);
                setConfirmAbsent(null);
                setConfirmStudentReg(null);
                
                if (payload.className === 'CANCELLED') showMsg("予約を取り消しました");
                else if (payload.className === 'ABSENT') showMsg("先生を欠席にしました");
                else showMsg("送信しました！");

                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                } catch (e) {
                    setData(previousData);
                    showMsg("通信エラーが発生しました。最新データに更新してください。", "error");
                }
            };

            const selectedDayOfWeek = new Date(selectedDate).getDay();
            const dayOfWeekStrs = ['日', '月', '火', '水', '木', '金', '土'];
            const isHol = holidays[selectedDate] !== undefined;
            const dayColorClass = (selectedDayOfWeek === 0 || isHol) ? 'bg-red-100 text-red-600' : selectedDayOfWeek === 6 ? 'bg-blue-100 text-blue-600' : 'border-slate-200 bg-white text-slate-700';

            const formattedDateForTitle = `${new Date(selectedDate).getFullYear()}年${new Date(selectedDate).getMonth() + 1}月${new Date(selectedDate).getDate()}日(${dayOfWeekStrs[selectedDayOfWeek]})`;

            const handlePrint = () => {
                setTimeout(() => {
                    window.print();
                }, 100);
            };

            const renderMatrix = (isTeacher) => {
                const themeBg500 = isTeacher ? 'bg-teacher-500' : 'bg-student-500';
                const themeBg600 = isTeacher ? 'bg-teacher-600' : 'bg-student-600';
                const themeBg200 = isTeacher ? 'bg-teacher-200' : 'bg-student-200';
                
                const displayStudents = activeStudents.filter(s => s[0].includes(studentFilter));

                return (
                    <section className="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden animate-fade-in print:shadow-none print:border-none print:m-0 print:p-0">
                        <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4 print:bg-white print:border-none print:px-0 print:py-2">
                            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between w-full gap-4">
                                <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                    <Icon name="calendar-check" size={20} className="print:hidden text-slate-500"/> 
                                    <span className="hidden print:inline mr-1 text-slate-800"><Icon name="calendar" size={18} /></span>
                                    {formattedDateForTitle} のシフト表
                                </h3>
                                
                                <div className="flex items-center gap-4">
                                    <button 
                                        onClick={handlePrint} 
                                        className="print:hidden flex items-center gap-1.5 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-xs sm:text-sm font-bold shadow-md transition-colors whitespace-nowrap"
                                    >
                                        <Icon name="printer" size={16} /> PDF保存
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div className="overflow-x-auto max-h-[600px] overflow-y-auto print:overflow-visible print:max-h-none">
                            <table className="w-full text-sm border-collapse min-w-max print:w-full">
                                <thead>
                                    <tr>
                                        <th className="p-2 text-center font-bold text-slate-500 sticky-corner border-b border-r border-slate-200 w-20 md:w-24 shadow-[1px_1px_0_#e2e8f0] text-xs leading-tight print:shadow-none print:border-slate-300">
                                            校時<br/><span className="text-[10px]">時間</span>
                                        </th>
                                        {/* ★ 先生が0人のときでも「該当なし」のセルを出して日課表の形を維持する */}
                                        {displayStudents.length === 0 ? <th className="p-3 text-center font-bold text-slate-400 sticky-top bg-slate-50 border-b border-r border-slate-200 shadow-[0_1px_0_#e2e8f0] print:shadow-none print:border-slate-300 min-w-[150px] max-w-[150px] w-[150px]">該当する先生がいません</th> :
                                            displayStudents.map((s, i) => (
                                                <th key={i} className="p-2 md:p-3 text-center min-w-[150px] max-w-[150px] w-[150px] font-bold text-slate-700 sticky-top bg-slate-50 border-b border-r border-slate-200 shadow-[0_1px_0_#e2e8f0] last:border-r-0 print:shadow-none print:bg-white print:border-slate-300">
                                                    <div 
                                                        className={`flex flex-col items-center justify-center mb-1 text-sm group/name relative ${isTeacher ? 'cursor-pointer hover:bg-red-50 rounded py-1 transition-colors print:hover:bg-transparent' : ''}`}
                                                        onClick={() => isTeacher && setConfirmAbsent(s[0])}
                                                        title={isTeacher ? "タップしてこの先生を欠席にする" : ""}
                                                    >
                                                        <div className={`flex items-center gap-1.5 font-bold ${isTeacher ? 'group-hover/name:text-red-600 print:text-slate-700' : ''}`}>
                                                            <Icon name={isTeacher ? "user-minus" : "user"} size={14} className={isTeacher ? "text-slate-400 group-hover/name:text-red-500 print:hidden" : "text-slate-400 print:hidden"}/> 
                                                            {s[0]}
                                                        </div>
                                                    </div>
                                                    <div className="inline-block px-2 py-0.5 bg-white rounded text-[10px] text-slate-500 border border-slate-200 font-mono print:border-none print:p-0">
                                                        {displayTime(s[3])}~{displayTime(s[4])}
                                                    </div>
                                                </th>
                                            ))
                                        }
                                    </tr>
                                </thead>
                                <tbody>
                                    {activePeriods.map((p, idx) => (
                                        <tr key={idx} className="group hover:bg-slate-50/50 transition-colors print:hover:bg-white">
                                            <td className="p-2 sticky-left border-b border-r border-slate-100 group-hover:bg-slate-50 transition-colors shadow-[1px_0_0_#f1f5f9] w-20 md:w-24 bg-white print:shadow-none print:border-slate-300 print:group-hover:bg-white">
                                                <div className="font-bold text-slate-700 flex flex-col items-center justify-center text-xs text-center h-full">
                                                    <span className="leading-tight">{p.name}</span>
                                                    <span className="text-[9px] text-slate-400 font-mono mt-1 print:text-slate-500">{p.start}-{p.end}</span>
                                                </div>
                                            </td>
                                            {/* ★ 先生が0人のときの空セル */}
                                            {displayStudents.length === 0 ? (
                                                <td className="p-2.5 text-center border-b border-r border-slate-100 last:border-r-0 min-w-[150px] max-w-[150px] w-[150px] print:border-slate-300 bg-slate-50/30">
                                                    <div className="text-slate-300 text-[10px] py-3 flex justify-center items-center h-full print:hidden">
                                                        <Icon name="minus" size={16}/>
                                                    </div>
                                                </td>
                                            ) : (
                                                displayStudents.map((s, sIdx) => {
                                                    const isAvailable = isPeriodAvailable({ start: s[3], end: s[4] }, p);
                                                    const reservation = data.reservations.find(r => checkDateMatch(r[0], selectedDate) && r[1] === p.name && r[2] === s[0] && r[3] !== 'CANCELLED');
                                                    return (
                                                        <td key={sIdx} className="p-2.5 text-center border-b border-r border-slate-100 last:border-r-0 min-w-[150px] max-w-[150px] w-[150px] print:border-slate-300">
                                                            {!isAvailable ? 
                                                                <div className="bg-slate-50 text-slate-300 text-[10px] py-3 rounded-lg flex justify-center items-center h-full print:hidden"><Icon name="minus" size={16} className="print:hidden"/></div> 
                                                            : reservation ? (
                                                                <button 
                                                                    onClick={() => isTeacher && setModal({ type: 'reserve', student: s[0], period: p.name, data: reservation })} 
                                                                    className={`w-full py-2.5 px-2 ${themeBg600} text-white rounded-lg text-xs font-bold shadow-md transition-all flex flex-col items-center gap-1 overflow-hidden print:shadow-none print:border print:border-slate-800 print:text-black ${isTeacher ? 'hover:opacity-90 hover:shadow-lg group/btn cursor-pointer' : 'cursor-default opacity-90'}`}
                                                                    style={{ WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' }}
                                                                >
                                                                    <span className="w-full truncate print:whitespace-normal">{reservation[3]}</span>
                                                                    <span className={`text-[9px] font-normal truncate w-full block print:whitespace-normal ${isTeacher ? 'opacity-70 group-hover/btn:opacity-100' : 'opacity-80'}`}>{reservation[4] || "詳細"}</span>
                                                                </button>
                                                            ) : (
                                                                <button 
                                                                    onClick={() => isTeacher && setModal({ type: 'reserve', student: s[0], period: p.name })} 
                                                                    className={`w-full py-3 bg-white border-2 border-dashed border-slate-200 text-slate-400 rounded-lg text-xs font-bold flex justify-center items-center gap-1 transition-all print:border-solid print:border-slate-300 print:text-slate-400 print:bg-white ${isTeacher ? 'hover:border-teacher-400 hover:text-teacher-600 hover:bg-teacher-50 cursor-pointer' : 'cursor-default opacity-70'}`}
                                                                    style={{ WebkitPrintColorAdjust: 'exact', printColorAdjust: 'exact' }}
                                                                >
                                                                    {isTeacher && <span className="print:hidden"><Icon name="plus" size={14} /></span>} 
                                                                    <span>空き</span>
                                                                </button>
                                                            )}
                                                        </td>
                                                    );
                                                })
                                            )}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </section>
                );
            };

            // ==========================================
            // ★ 学生用画面の下に追加する「今週の勤務」コンポーネント
            // ==========================================
            const renderWeeklySchedule = () => {
                // 現在選択されている日付（selectedDate）が属する週の日〜土を計算
                const [yStr, mStr, dStr] = selectedDate.split('-');
                const currentSelectedDate = new Date(yStr, mStr - 1, dStr);
                const startOfWeek = new Date(currentSelectedDate);
                startOfWeek.setDate(currentSelectedDate.getDate() - currentSelectedDate.getDay()); // 日曜日に戻す

                const weekDays = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(startOfWeek);
                    d.setDate(startOfWeek.getDate() + i);
                    weekDays.push(d);
                }
                
                return (
                    <section className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 print:hidden mt-8">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="bg-student-100 p-2 rounded-full text-student-600"><Icon name="calendar" size={24} /></div>
                            <h2 className="text-xl font-bold text-slate-800">今週の勤務状況</h2>
                        </div>
                        <div className="overflow-x-auto pb-4">
                            <div className="grid grid-cols-7 min-w-[600px] border-l border-t border-slate-200 rounded-lg overflow-hidden">
                                {weekDays.map((d, i) => {
                                    const y = d.getFullYear();
                                    const m = String(d.getMonth() + 1).padStart(2, '0');
                                    const day = String(d.getDate()).padStart(2, '0');
                                    const dateStr = `${y}-${m}-${day}`;
                                    
                                    // その日の出勤予定の先生をリストアップ
                                    const absentStudentNames = data.reservations
                                        .filter(r => checkDateMatch(r[0], dateStr) && r[1] === 'ABSENT' && r[3] === 'ABSENT')
                                        .map(r => r[2]);
                                    const studentsOnDay = data.students
                                        .filter(s => checkDateMatch(s[2], dateStr) && !absentStudentNames.includes(s[0]))
                                        .map(s => s[0]);
                                    
                                    // 重複を削除（同じ人が複数回登録していた場合のため）
                                    const uniqueStudents = [...new Set(studentsOnDay)];
                                    
                                    const isToday = dateStr === selectedDate;
                                    const dayStrs = ['日', '月', '火', '水', '木', '金', '土'];
                                    
                                    // 日曜・土曜・祝日の色判定
                                    const isHol = holidays[dateStr] !== undefined;
                                    const dayColor = (i === 0 || isHol) ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-slate-700';

                                    return (
                                        <div key={i} className={`border-r border-b border-slate-200 flex flex-col ${isToday ? 'bg-student-50/50' : 'bg-white'}`}>
                                            <div className={`p-2 text-center border-b border-slate-200 font-bold text-sm ${dayColor} ${isToday ? 'bg-student-100/50' : 'bg-slate-50'}`}>
                                                {d.getMonth() + 1}/{d.getDate()}<br />
                                                <span className="text-xs">({dayStrs[i]})</span>
                                            </div>
                                            <div className="p-2 flex-1 min-h-[120px] flex flex-col gap-1.5">
                                                {uniqueStudents.length > 0 ? (
                                                    uniqueStudents.map((name, idx) => (
                                                        <div key={idx} className={`text-xs border rounded px-1.5 py-1 shadow-sm truncate font-medium ${isToday ? 'bg-white border-student-200 text-student-700' : 'bg-white border-slate-200 text-slate-700'}`}>
                                                            {name}
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="text-xs text-slate-300 text-center mt-2">-</div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </section>
                );
            };

            return (
                <div className="min-h-screen pb-12 print:pb-0 print:bg-white">
                    {/* Header (印刷時非表示) */}
                    <header className={`bg-white border-b border-slate-200 sticky top-0 z-40 transition-colors duration-300 shadow-sm print:hidden`}>
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className={`p-1.5 rounded-lg ${view === 'student' ? 'bg-student-500' : 'bg-teacher-500'} text-white transition-colors`}>
                                    <Icon name={view === 'student' ? 'graduation-cap' : 'users'} size={24} />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-800 hidden sm:block">
                                    学生ボランティア予約
                                </h1>
                            </div>
                            
                            <div className="flex bg-slate-100 p-1 rounded-xl shadow-inner border border-slate-200/60">
                                <button onClick={() => setView('student')} className={`relative px-4 sm:px-6 py-1.5 text-sm font-bold rounded-lg transition-all duration-200 ${view === 'student' ? 'text-student-600 bg-white shadow-sm ring-1 ring-slate-900/5' : 'text-slate-500 hover:text-slate-700'}`}>
                                    学生用
                                </button>
                                <button onClick={() => { if (view !== 'teacher') setPasswordModal(true); }} className={`relative px-4 sm:px-6 py-1.5 text-sm font-bold rounded-lg transition-all duration-200 ${view === 'teacher' ? 'text-teacher-600 bg-white shadow-sm ring-1 ring-slate-900/5' : 'text-slate-500 hover:text-slate-700'}`}>
                                    <span className="flex items-center gap-1">教員用 {view !== 'teacher' && <Icon name="lock" size={14} className="opacity-50" />}</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* メッセージ (印刷時非表示) */}
                    {msg && (
                        <div className="fixed top-6 left-0 right-0 z-[100] flex justify-center px-4 pointer-events-none print:hidden">
                            <div className={`animate-slide-down flex items-center justify-center gap-3 p-4 rounded-2xl shadow-xl border w-full max-w-sm ${msg.type === 'error' ? 'bg-red-50 text-red-800 border-red-200' : `bg-${theme}-600 text-white border-${theme}-500`}`}>
                                <Icon name={msg.type === 'error' ? 'alert-circle' : 'check-circle'} size={20} />
                                <span className="font-bold text-sm">{msg.text}</span>
                            </div>
                        </div>
                    )}

                    <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 space-y-8 animate-fade-in print:px-0 print:mt-0 print:space-y-4">
                        
                        {/* 日付・更新 セクション (印刷時非表示) */}
                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row items-start md:items-center gap-6 justify-between relative overflow-hidden print:hidden">
                            <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${view === 'student' ? 'bg-student-500' : 'bg-teacher-500'}`}></div>
                            <div className="pl-2 flex-1">
                                <h2 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">Activity Date</h2>
                                <div className="flex items-center gap-3">
                                    <Icon name="calendar-days" className="text-slate-400" size={24} />
                                    <span className="text-2xl font-black text-slate-800">
                                        活動日を選択
                                    </span>
                                </div>
                            </div>
                            <div className="w-full md:w-auto flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                                <div className="flex items-center gap-2">
                                    <input 
                                        type="date" 
                                        value={selectedDate} 
                                        onChange={(e) => setSelectedDate(e.target.value)} 
                                        className={`w-full sm:w-auto p-3 text-lg font-bold border-2 border-slate-200 rounded-xl outline-none transition focus:border-${theme}-500 focus:ring-4 focus:ring-${theme}-500/10 text-slate-700`}
                                    />
                                    <span className={`text-sm px-3 py-3.5 rounded-xl font-bold border whitespace-nowrap ${dayColorClass}`}>
                                        {isHol ? holidays[selectedDate] : `${dayOfWeekStrs[selectedDayOfWeek]}曜日`}
                                    </span>
                                </div>
                                <button onClick={fetchData} disabled={loading} className={`w-full sm:w-auto px-6 py-3.5 rounded-xl border border-blue-600 bg-blue-600 text-white hover:bg-blue-700 transition shadow-md disabled:opacity-50 flex items-center justify-center gap-2 font-bold`}>
                                    <Icon name="refresh-cw" size={18} className={loading ? `animate-spin` : ""} />
                                    <span>最新データに更新</span>
                                </button>
                            </div>
                        </section>

                        {/* 学生用画面 */}
                        {view === 'student' ? (
                            <div className="space-y-8 animate-fade-in print:space-y-4">
                                <section className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 print:hidden">
                                    <div className="flex items-center gap-3 mb-8">
                                        <div className="bg-student-100 p-2 rounded-full text-student-600"><Icon name="clock" size={24} /></div>
                                        <h2 className="text-xl font-bold text-slate-800">勤務可能時間を登録</h2>
                                    </div>
                                    <form ref={studentFormRef} onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        setConfirmStudentReg({ type: 'reg_student', name: fd.get('name'), email: "", date: selectedDate, start: fd.get('start'), end: fd.get('end') });
                                    }} className="space-y-6">
                                        <div className="grid md:grid-cols-3 gap-6 items-start">
                                            <div className="space-y-2 md:col-span-1">
                                                <label className="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><Icon name="user" size={14}/> 氏名（名字のみでOK）</label>
                                                <input name="name" required className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-student-500 focus:ring-4 focus:ring-student-500/10 transition outline-none" placeholder="例: 倉田" />
                                            </div>
                                            <div className="md:col-span-2 p-4 bg-slate-50 rounded-xl border border-slate-200">
                                                <div className="flex items-center gap-2 text-sm font-bold text-slate-600 mb-3"><Icon name="timer" size={16}/> 勤務可能な時間帯を選択</div>
                                                <div className="flex items-center gap-4">
                                                    <div className="flex-1">
                                                        <label className="text-xs font-bold text-slate-500 block mb-1">開始時間</label>
                                                        <input type="time" name="start" required defaultValue="08:30" className="w-full p-3 border border-slate-300 rounded-lg text-center text-xl font-bold font-mono focus:border-student-500 focus:ring-2 focus:ring-student-500/20 outline-none transition mt-1 cursor-pointer" />
                                                    </div>
                                                    <span className="text-slate-400 font-bold mt-5">〜</span>
                                                    <div className="flex-1">
                                                        <label className="text-xs font-bold text-slate-500 block mb-1">終了時間</label>
                                                        <input type="time" name="end" required defaultValue="15:30" className="w-full p-3 border border-slate-300 rounded-lg text-center text-xl font-bold font-mono focus:border-student-500 focus:ring-2 focus:ring-student-500/20 outline-none transition mt-1 cursor-pointer" />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <button className="w-full bg-student-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-student-500/30 hover:bg-student-600 hover:shadow-xl hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:hover:translate-y-0">
                                            確認画面へ
                                        </button>
                                    </form>
                                </section>
                                
                                {renderMatrix(false)}
                                
                                {/* ★ 新設: 今週の勤務状況 */}
                                {renderWeeklySchedule()}
                            </div>
                        ) : (
                            /* 教員用画面 */
                            <div className="space-y-8 animate-fade-in print:space-y-4">
                                <section className="bg-teacher-50 p-6 rounded-2xl border border-teacher-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 shadow-sm print:hidden">
                                    <div className="flex items-start gap-4">
                                        <div className="bg-white p-2.5 rounded-xl shadow-sm text-teacher-600 mt-1">
                                            <Icon name="settings-2" size={24} />
                                        </div>
                                        <div>
                                            <div className="text-sm font-bold text-teacher-900 mb-1">本日の時程設定</div>
                                            <div className="inline-flex items-center gap-2 bg-white px-3 py-1 rounded-md border border-teacher-200">
                                                <span className="relative flex h-2 w-2">
                                                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-teacher-400 opacity-75"></span>
                                                  <span className="relative inline-flex rounded-full h-2 w-2 bg-teacher-500"></span>
                                                </span>
                                                <span className="text-xs font-black text-teacher-700 uppercase">
                                                    {(() => {
                                                        const currentSetting = [...data.schedules].reverse().find(s => checkDateMatch(s[0], selectedDate));
                                                        if (currentSetting) return currentSetting[1];
                                                        const day = new Date(selectedDate).getDay();
                                                        return (day === 0 || day === 6 || isHol) ? "休み" : "通常日課";
                                                    })()}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200 w-full md:w-auto">
                                        {["通常日課", "短縮時程", "委員会・クラブ", "休み"].map(p => {
                                            const currentSetting = [...data.schedules].reverse().find(s => checkDateMatch(s[0], selectedDate));
                                            let current = currentSetting ? currentSetting[1] : "通常日課";
                                            if (!currentSetting) {
                                                const day = new Date(selectedDate).getDay();
                                                if (day === 0 || day === 6 || isHol) current = "休み";
                                            }
                                            const isCurrent = (p === current);
                                            return (
                                                <button 
                                                    key={p} 
                                                    onClick={() => handlePost({ type: 'set_schedule', date: selectedDate, pattern: p })} 
                                                    className={`flex-1 md:flex-none px-4 py-2 text-xs font-bold rounded-lg transition-all ${isCurrent ? 'bg-teacher-600 text-white shadow-md pointer-events-none' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50 hover:text-teacher-600'}`}
                                                >
                                                    {p}
                                                </button>
                                            )
                                        })}
                                    </div>
                                </section>
                                {renderMatrix(true)}
                            </div>
                        )}
                    </main>

                    {/* モーダル類 (印刷時非表示) */}
                    {confirmAbsent && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 print:hidden">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setConfirmAbsent(null)}></div>
                            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden relative z-10 animate-slide-down">
                                <div className="p-6 bg-red-500 text-white flex justify-between items-start">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icon name="user-minus" /> ボランティアの欠席</h3>
                                </div>
                                <div className="p-6 space-y-5">
                                    <p className="font-bold text-slate-800 text-center text-lg">{confirmAbsent} 先生</p>
                                    <p className="text-sm text-slate-600 font-medium text-center leading-relaxed">
                                        この先生を本日のリストから削除（欠席）にしますか？<br/>
                                        <span className="text-xs text-red-500 font-bold mt-1 block">※すでに入っている予約枠も削除されます。</span>
                                    </p>
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setConfirmAbsent(null)} className="flex-1 py-3.5 font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition">キャンセル</button>
                                        <button type="button" onClick={() => {
                                            handlePost({ type: 'reserve', date: selectedDate, periodName: 'ABSENT', studentName: confirmAbsent, className: 'ABSENT', note: '' });
                                        }} className="flex-1 bg-red-500 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-red-500/30 hover:bg-red-600 hover:-translate-y-0.5 transition-all">欠席にする</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmStudentReg && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 print:hidden">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setConfirmStudentReg(null)}></div>
                            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden relative z-10 animate-slide-down">
                                <div className="p-6 bg-student-500 text-white flex justify-between items-start">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icon name="help-circle" /> 登録内容の確認</h3>
                                </div>
                                <div className="p-6 space-y-5">
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                        <p className="text-xs font-bold text-slate-500 mb-1">氏名</p>
                                        <p className="font-bold text-slate-800 text-lg mb-3">{confirmStudentReg.name} 先生</p>
                                        <p className="text-xs font-bold text-slate-500 mb-1">活動日と時間帯</p>
                                        <p className="font-bold text-slate-800 font-mono text-base">{confirmStudentReg.date}</p>
                                        <p className="font-bold text-slate-800 font-mono text-xl">{confirmStudentReg.start} 〜 {confirmStudentReg.end}</p>
                                    </div>
                                    <p className="text-sm text-slate-600 font-medium text-center">この内容で送信してよろしいですか？</p>
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setConfirmStudentReg(null)} className="flex-1 py-3.5 font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition">修正する</button>
                                        <button type="button" onClick={() => {
                                            handlePost(confirmStudentReg);
                                            if(studentFormRef.current) studentFormRef.current.reset();
                                        }} className="flex-1 bg-student-500 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-student-500/30 hover:bg-student-600 hover:-translate-y-0.5 transition-all">送信する</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {passwordModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 print:hidden">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => { setPasswordModal(false); setPasswordError(""); }}></div>
                            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden relative z-10 animate-slide-down">
                                <div className="p-6 bg-teacher-600 text-white flex justify-between items-start">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icon name="lock" /> 教員用ログイン</h3>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const pass = new FormData(e.target).get('password');
                                    if (pass === "5963") {
                                        setPasswordModal(false);
                                        setPasswordError("");
                                        setView('teacher');
                                    } else {
                                        setPasswordError("パスワードが正しくありません");
                                    }
                                }} className="p-6 space-y-5">
                                    <div className="space-y-2">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><Icon name="key" size={14}/> パスワードを入力</label>
                                        <input name="password" type="password" required autoFocus className="w-full p-4 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:bg-white focus:border-teacher-500 focus:ring-4 focus:ring-teacher-500/10 transition font-bold text-slate-700 text-center tracking-[0.5em] text-lg" placeholder="****" />
                                    </div>
                                    {passwordError && (
                                        <div className="text-red-500 text-xs font-bold text-center flex items-center justify-center gap-1 animate-pulse">
                                            <Icon name="alert-triangle" size={14} /> {passwordError}
                                        </div>
                                    )}
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => { setPasswordModal(false); setPasswordError(""); }} className="flex-1 py-3.5 font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition">キャンセル</button>
                                        <button type="submit" className="flex-1 bg-teacher-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-teacher-500/30 hover:bg-teacher-700 hover:-translate-y-0.5 transition-all">ログイン</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {modal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 print:hidden">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setModal(null)}></div>
                            <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden relative z-10 animate-slide-down">
                                <div className="p-6 bg-teacher-600 text-white flex justify-between items-start">
                                    <div>
                                        <h3 className="text-xl font-bold flex items-center gap-2 mb-1"><Icon name="calendar-check" /> 予約の確定</h3>
                                        <p className="text-sm text-teacher-100 font-medium">{selectedDate} <span className="mx-2">|</span> {modal.period}</p>
                                    </div>
                                    <div className="bg-white/20 px-3 py-1 rounded-lg text-sm font-bold backdrop-blur-md">
                                        {modal.student} 先生
                                    </div>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handlePost({ type: 'reserve', date: selectedDate, periodName: modal.period, studentName: modal.student, className: fd.get('class'), note: fd.get('note') });
                                }} className="p-6">
                                    <div className="space-y-6">
                                        <div className="space-y-2">
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><Icon name="users" size={14}/> 担当クラス <span className="text-red-500">*</span></label>
                                            <select name="class" defaultValue={modal.data?.[3] || ""} required className="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:bg-white focus:border-teacher-500 focus:ring-4 focus:ring-teacher-500/10 transition font-bold text-slate-700">
                                                <option value="" disabled>選択してください</option>
                                                {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><Icon name="pencil-line" size={14}/> 備考（授業名など）</label>
                                            <textarea name="note" defaultValue={modal.data?.[4] || ""} rows="3" className="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:bg-white focus:border-teacher-500 focus:ring-4 focus:ring-teacher-500/10 transition resize-none" placeholder="例：算数の丸付け補助をお願いします" />
                                        </div>
                                        <div className="flex gap-3 pt-2">
                                            <button type="button" onClick={() => setModal(null)} className="flex-1 py-3.5 font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition">キャンセル</button>
                                            <button type="submit" className="flex-1 bg-teacher-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-teacher-500/30 hover:bg-teacher-700 hover:-translate-y-0.5 transition-all">予約を確定</button>
                                        </div>
                                    </div>
                                    {modal.data && (
                                        <div className="mt-4 pt-4 border-t border-slate-200">
                                            <button 
                                                type="button" 
                                                onClick={() => {
                                                    handlePost({ type: 'reserve', date: selectedDate, periodName: modal.period, studentName: modal.student, className: 'CANCELLED', note: '' });
                                                }} 
                                                className="w-full py-3 text-red-500 text-sm font-bold rounded-xl hover:bg-red-50 border border-red-100 transition-colors flex justify-center items-center gap-2"
                                            >
                                                <Icon name="trash-2" size={16} /> この予約を取り消す
                                            </button>
                                        </div>
                                    )}
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 初回読み込み時のスピナー */}
                    {loading && data.schedules.length === 0 && (
                        <div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-[100] flex flex-col items-center justify-center animate-fade-in">
                            <div className="w-12 h-12 border-4 border-slate-200 border-t-teacher-600 rounded-full animate-spin shadow-lg"></div>
                            <p className="mt-4 font-bold text-slate-600 tracking-widest text-sm animate-pulse">読み込み中...</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
