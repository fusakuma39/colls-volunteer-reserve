<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生ボランティア予約システム</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        student: { 50: '#f0fdfa', 100: '#ccfbf1', 500: '#14b8a6', 600: '#0d9488' },
                        teacher: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }
                    },
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', '"Hiragino Kaku Gothic ProN"', '"Hiragino Sans"', 'Meiryo', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .sticky-top { position: sticky; top: 0; z-index: 20; }
        .sticky-left { position: sticky; left: 0; z-index: 20; background-color: white; }
        .sticky-corner { position: sticky; top: 0; left: 0; z-index: 30; background-color: #f8fafc; }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide-down { animation: slideDown 0.3s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        
        /* input type="time" のデザイン調整 */
        input[type="time"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        input[type="time"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // ↓↓↓ GASのウェブアプリURLをここに貼り付けます ↓↓↓
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbz4rLEKB4PLxqpOm0ZcyyIw9QmsalJt-Rssss0a1BZ50_Hj_hzShxl3dxAvUzzZE62-/exec"; 
        // ==========================================

        const CLASSES = [
            "1-1", "1-2", "2-1", "2-2", "3-1", "3-2",
            "4-1", "4-2", "5-1", "5-2", "6-1", "6-2",
            "個別1", "個別2", "専科", "その他"
        ];

        const TIMETABLE_PATTERNS = {
            "通常日課": {
                "morning": { name: "朝学習/したく", start: "08:10", end: "08:45" },
                "periods": [
                    { name: "1時間目", start: "08:45", end: "09:30" },
                    { name: "2時間目", start: "09:35", end: "10:20" },
                    { name: "中休み", start: "10:20", end: "10:40" },
                    { name: "3時間目", start: "10:40", end: "11:25" },
                    { name: "4時間目", start: "11:30", end: "12:15" },
                    { name: "給食", start: "12:15", end: "13:00" },
                    { name: "掃除", start: "13:00", end: "13:20" }
                ],
                "afternoon_long": [ 
                    { name: "昼休み", start: "13:20", end: "13:40" },
                    { name: "5時間目", start: "13:40", end: "14:25" },
                    { name: "6時間目", start: "14:30", end: "15:15" },
                    { name: "帰りの会", start: "15:15", end: "15:30" }
                ],
                "afternoon_short": [ 
                    { name: "5時間目", start: "13:20", end: "14:05" },
                    { name: "帰りの会", start: "14:05", end: "15:20" }
                ]
            },
            "短縮時程": [
                { name: "朝の会", start: "08:10", end: "08:30" },
                { name: "1時間目", start: "08:30", end: "09:15" },
                { name: "2時間目", start: "09:20", end: "10:05" },
                { name: "中休み", start: "10:05", end: "10:15" },
                { name: "3時間目", start: "10:15", end: "11:00" },
                { name: "4時間目", start: "11:05", end: "11:50" },
                { name: "給食", start: "11:50", end: "12:40" },
                { name: "帰りの会", start: "12:40", end: "13:00" }
            ],
            "委員会・クラブ": [
                { name: "朝学習", start: "08:10", end: "08:45" },
                { name: "1時間目", start: "08:45", end: "09:30" },
                { name: "2時間目", start: "09:35", end: "10:20" },
                { name: "中休み", start: "10:20", end: "10:40" },
                { name: "3時間目", start: "10:40", end: "11:25" },
                { name: "4時間目", start: "11:30", end: "12:15" },
                { name: "給食", start: "12:15", end: "13:00" },
                { name: "掃除", start: "13:00", end: "13:20" },
                { name: "5時間目", start: "13:20", end: "14:05" },
                { name: "6時間目", start: "14:05", end: "15:15" }
            ]
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const elRef = useRef(null);
            useEffect(() => {
                if (elRef.current && window.lucide.icons[name]) {
                    elRef.current.innerHTML = window.lucide.icons[name].toSvg({ class: className, width: size, height: size });
                }
            }, [name, size, className]);
            return <span ref={elRef} className="inline-flex items-center justify-center" />;
        };

        function App() {
            const [view, setView] = useState('student');
            const [data, setData] = useState({ schedules: [], students: [], reservations: [] });
            const [loading, setLoading] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [modal, setModal] = useState(null);
            const [msg, setMsg] = useState(null); 
            const [studentFilter, setStudentFilter] = useState("");
            
            const [passwordModal, setPasswordModal] = useState(false);
            const [passwordError, setPasswordError] = useState("");

            const theme = view === 'student' ? 'student' : 'teacher';

            // ★初回読み込み時のみ通信するように変更（タブ切り替えを高速化）
            const fetchData = async () => {
                if (!API_URL) return;
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}?mode=student`);
                    const json = await res.json();
                    setData(json);
                } catch (e) {
                    showMsg("データの取得に失敗しました。", "error");
                }
                setLoading(false);
            };

            // 依存配列を空にして、最初の1回だけ読み込む
            useEffect(() => { fetchData(); }, []);

            const showMsg = (text, type = "success") => {
                setMsg({ text, type });
                setTimeout(() => setMsg(null), 4000);
            };

            const isPeriodAvailable = (student, period) => {
                // startとendは <input type="time"> なので確実に "HH:mm" 形式で入ってくる
                if (!student.start || !student.end) return false;
                const sStart = parseInt(student.start.replace(':', ''), 10);
                const sEnd = parseInt(student.end.replace(':', ''), 10);
                const pStart = parseInt(period.start.replace(':', ''), 10);
                const pEnd = parseInt(period.end.replace(':', ''), 10);
                return sStart <= pStart && sEnd >= pEnd;
            };

            const getDailyPeriods = (dateStr) => {
                const manual = data.schedules.find(s => s[0].toString().includes(dateStr));
                if (manual && manual[1] !== "通常日課") return TIMETABLE_PATTERNS[manual[1]];

                const d = new Date(dateStr);
                const day = d.getDay();
                const base = TIMETABLE_PATTERNS["通常日課"];
                let periods = [base.morning, ...base.periods];
                if ([1, 2, 4].includes(day)) {
                    periods = periods.concat(base.afternoon_long);
                } else {
                    periods = periods.concat(base.afternoon_short);
                }
                return periods;
            };

            const activePeriods = useMemo(() => getDailyPeriods(selectedDate), [selectedDate, data.schedules]);
            const activeStudents = useMemo(() => data.students.filter(s => s[2].toString().includes(selectedDate)), [selectedDate, data.students]);

            const handlePost = async (payload) => {
                if (!API_URL) {
                    showMsg("API URLが設定されていません。", "error");
                    return;
                }
                setLoading(true); // 送信時だけローディングを出す
                try {
                    await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    await fetchData(); // 送信後に最新データを取得
                    setModal(null);
                    showMsg("データの登録が完了しました！");
                } catch (e) {
                    showMsg("通信エラーが発生しました。", "error");
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Header */}
                    <header className={`bg-white border-b border-slate-200 sticky top-0 z-40 transition-colors duration-300 shadow-sm`}>
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className={`p-1.5 rounded-lg ${view === 'student' ? 'bg-student-500' : 'bg-teacher-500'} text-white transition-colors`}>
                                    <Icon name={view === 'student' ? 'graduation-cap' : 'users'} size={24} />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-800 hidden sm:block">
                                    学生ボランティア予約
                                </h1>
                            </div>
                            
                            <div className="flex bg-slate-100 p-1 rounded-xl shadow-inner border border-slate-200/60">
                                <button 
                                    onClick={() => setView('student')} 
                                    className={`relative px-4 sm:px-6 py-1.5 text-sm font-bold rounded-lg transition-all duration-200 ${view === 'student' ? 'text-student-600 bg-white shadow-sm ring-1 ring-slate-900/5' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    学生用
                                </button>
                                <button 
                                    onClick={() => {
                                        if (view !== 'teacher') setPasswordModal(true);
                                    }} 
                                    className={`relative px-4 sm:px-6 py-1.5 text-sm font-bold rounded-lg transition-all duration-200 ${view === 'teacher' ? 'text-teacher-600 bg-white shadow-sm ring-1 ring-slate-900/5' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    <span className="flex items-center gap-1">
                                        教員用 {view !== 'teacher' && <Icon name="lock" size={14} className="opacity-50" />}
                                    </span>
                                </button>
                            </div>
                        </div>
                    </header>

                    {msg && (
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-6 z-50 animate-slide-down">
                            <div className={`flex items-center gap-3 p-4 rounded-xl border shadow-sm ${msg.type === 'error' ? 'bg-red-50 text-red-800 border-red-200' : `bg-${theme}-50 text-${theme}-800 border-${theme}-200`}`}>
                                <Icon name={msg.type === 'error' ? 'alert-circle' : 'check-circle'} size={20} />
                                <span className="font-bold text-sm">{msg.text}</span>
                            </div>
                        </div>
                    )}

                    <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 space-y-8 animate-fade-in">
                        
                        <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-start sm:items-center gap-6 justify-between relative overflow-hidden">
                            <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${view === 'student' ? 'bg-student-500' : 'bg-teacher-500'}`}></div>
                            <div className="pl-2">
                                <h2 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">Activity Date</h2>
                                <div className="flex items-center gap-3">
                                    <Icon name="calendar-days" className="text-slate-400" size={24} />
                                    <span className="text-2xl font-black text-slate-800">活動日を選択</span>
                                </div>
                            </div>
                            <div className="w-full sm:w-auto">
                                <input 
                                    type="date" 
                                    value={selectedDate} 
                                    onChange={(e) => setSelectedDate(e.target.value)} 
                                    className={`w-full sm:w-64 p-3 text-lg font-bold border-2 border-slate-200 rounded-xl outline-none transition focus:border-${theme}-500 focus:ring-4 focus:ring-${theme}-500/10 text-slate-700`}
                                />
                            </div>
                        </section>

                        {view === 'student' ? (
                            <div className="grid lg:grid-cols-5 gap-8">
                                <section className="lg:col-span-3 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-3 mb-8">
                                        <div className="bg-student-100 p-2 rounded-full text-student-600"><Icon name="clock" size={24} /></div>
                                        <h2 className="text-xl font-bold text-slate-800">勤務可能時間を登録</h2>
                                    </div>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const fd = new FormData(e.target);
                                        // ★メールアドレスは空文字を送るように変更
                                        handlePost({ type: 'reg_student', name: fd.get('name'), email: "", date: selectedDate, start: fd.get('start'), end: fd.get('end') });
                                        e.target.reset();
                                    }} className="space-y-6">
                                        
                                        {/* ★氏名のみに減らし、例を「倉田」に変更 */}
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><Icon name="user" size={14}/> 氏名（名字のみでOK）</label>
                                            <input name="name" required className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-student-500 focus:ring-4 focus:ring-student-500/10 transition outline-none" placeholder="例: 倉田" />
                                        </div>

                                        <div className="p-5 bg-slate-50 rounded-xl border border-slate-200 space-y-4">
                                            <div className="flex items-center gap-2 text-sm font-bold text-slate-600 mb-2">
                                                <Icon name="timer" size={16}/> 勤務可能な時間帯を選択
                                            </div>
                                            <div className="grid grid-cols-2 gap-6 items-center">
                                                {/* ★ input type="time" に変更（スマホでドラムロールが出る） */}
                                                <div>
                                                    <label className="text-xs font-bold text-slate-500">開始時間</label>
                                                    <input type="time" name="start" required defaultValue="08:30" className="w-full p-3 border border-slate-300 rounded-lg text-center text-xl font-bold font-mono focus:border-student-500 focus:ring-2 focus:ring-student-500/20 outline-none transition mt-1 cursor-pointer" />
                                                </div>
                                                <div>
                                                    <label className="text-xs font-bold text-slate-500">終了時間</label>
                                                    <input type="time" name="end" required defaultValue="15:30" className="w-full p-3 border border-slate-300 rounded-lg text-center text-xl font-bold font-mono focus:border-student-500 focus:ring-2 focus:ring-student-500/20 outline-none transition mt-1 cursor-pointer" />
                                                </div>
                                            </div>
                                        </div>
                                        <button disabled={loading} className="w-full bg-student-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-student-500/30 hover:bg-student-600 hover:shadow-xl hover:-translate-y-0.5 transition-all disabled:opacity-50 disabled:hover:translate-y-0">
                                            登録する
                                        </button>
                                    </form>
                                </section>

                                <section className="lg:col-span-2 flex flex-col h-[600px]">
                                    <div className="bg-white p-6 rounded-t-2xl shadow-sm border border-slate-200 border-b-0">
                                        <div className="flex items-center justify-between mb-4">
                                            <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                                <Icon name="check-square" className="text-student-500" /> 確定した予定
                                            </h2>
                                            <span className="bg-slate-100 text-slate-600 text-xs font-bold px-2 py-1 rounded-md">{selectedDate}</span>
                                        </div>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                                <Icon name="search" size={16} />
                                            </div>
                                            <input 
                                                type="text" 
                                                placeholder="氏名で絞り込み..." 
                                                value={studentFilter}
                                                onChange={(e) => setStudentFilter(e.target.value)}
                                                className="w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:border-student-400 focus:ring-2 focus:ring-student-400/20 outline-none transition"
                                            />
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-b-2xl shadow-inner border border-slate-200 flex-1 overflow-y-auto">
                                        <div className="space-y-3">
                                            {(() => {
                                                const filtered = data.reservations.filter(r => r[0].toString().includes(selectedDate) && r[2].toString().includes(studentFilter));
                                                if (filtered.length === 0) {
                                                    return (
                                                        <div className="flex flex-col items-center justify-center h-48 text-slate-400 opacity-60">
                                                            <Icon name="calendar-x" size={48} className="mb-3" />
                                                            <p className="font-medium">予定はありません</p>
                                                        </div>
                                                    );
                                                }
                                                return filtered.map((r, i) => (
                                                    <div key={i} className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 border-l-4 border-l-student-500 hover:shadow-md transition">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <span className="font-black text-slate-800">{r[1]} <span className="text-slate-400 font-medium mx-1">|</span> {r[3]}</span>
                                                            <span className="text-[10px] bg-student-50 text-student-700 px-2.5 py-1 rounded-full font-bold whitespace-nowrap">{r[2]} 様</span>
                                                        </div>
                                                        <div className="text-sm text-slate-500 leading-relaxed bg-slate-50 p-2 rounded flex gap-2">
                                                            <Icon name="info" size={16} className="text-slate-400 shrink-0 mt-0.5" />
                                                            <span>{r[4] || "備考なし"}</span>
                                                        </div>
                                                    </div>
                                                ));
                                            })()}
                                        </div>
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                <section className="bg-teacher-50 p-6 rounded-2xl border border-teacher-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 shadow-sm">
                                    <div className="flex items-start gap-4">
                                        <div className="bg-white p-2.5 rounded-xl shadow-sm text-teacher-600 mt-1">
                                            <Icon name="settings-2" size={24} />
                                        </div>
                                        <div>
                                            <div className="text-sm font-bold text-teacher-900 mb-1">本日の時程設定</div>
                                            <div className="inline-flex items-center gap-2 bg-white px-3 py-1 rounded-md border border-teacher-200">
                                                <span className="relative flex h-2 w-2">
                                                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-teacher-400 opacity-75"></span>
                                                  <span className="relative inline-flex rounded-full h-2 w-2 bg-teacher-500"></span>
                                                </span>
                                                <span className="text-xs font-black text-teacher-700 uppercase">{data.schedules.find(s => s[0].toString().includes(selectedDate))?.[1] || "通常（自動判別）"}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-2 bg-white p-1.5 rounded-xl border border-teacher-100 w-full md:w-auto">
                                        {["通常日課", "短縮時程", "委員会・クラブ"].map(p => {
                                            const current = data.schedules.find(s => s[0].toString().includes(selectedDate))?.[1] || "通常日課";
                                            const isCurrent = p.includes(current.split('')[0]);
                                            return (
                                                <button 
                                                    key={p} 
                                                    onClick={() => handlePost({ type: 'set_schedule', date: selectedDate, pattern: p })} 
                                                    className={`flex-1 md:flex-none px-4 py-2 text-xs font-bold rounded-lg transition-all ${isCurrent ? 'bg-teacher-100 text-teacher-700 pointer-events-none' : 'text-slate-500 hover:bg-slate-50 hover:text-teacher-600'}`}
                                                >
                                                    {p}
                                                </button>
                                            )
                                        })}
                                    </div>
                                </section>

                                <section className="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                                    <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex items-center justify-between">
                                        <h3 className="font-bold text-slate-700 flex items-center gap-2"><Icon name="table" size={18}/> 予約状況マトリックス</h3>
                                        <div className="text-xs font-medium text-slate-500 flex gap-4">
                                            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-teacher-500"></span> 予約済</span>
                                            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded border border-dashed border-slate-300"></span> 空き枠</span>
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto max-h-[600px] overflow-y-auto">
                                        <table className="w-full text-sm border-collapse min-w-max">
                                            <thead>
                                                <tr>
                                                    <th className="p-4 text-left font-bold text-slate-500 sticky-corner border-b border-r border-slate-200 w-40 shadow-[1px_1px_0_#e2e8f0]">
                                                        校時 / 時間
                                                    </th>
                                                    {activeStudents.length === 0 ? <th className="p-4 text-slate-400 font-normal sticky-top bg-slate-50 border-b border-slate-200 shadow-[0_1px_0_#e2e8f0]">該当する学生がいません</th> :
                                                        activeStudents.map((s, i) => (
                                                            <th key={i} className="p-3 text-center min-w-[150px] font-bold text-slate-700 sticky-top bg-slate-50 border-b border-r border-slate-200 shadow-[0_1px_0_#e2e8f0] last:border-r-0">
                                                                <div className="flex items-center justify-center gap-1.5 mb-1 text-sm"><Icon name="user" size={14} className="text-slate-400"/> {s[0]}</div>
                                                                <div className="inline-block px-2 py-0.5 bg-white rounded text-[10px] text-slate-500 border border-slate-200 font-mono">{s[3]}~{s[4]}</div>
                                                            </th>
                                                        ))
                                                    }
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {activePeriods.map((p, idx) => (
                                                    <tr key={idx} className="group hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-4 sticky-left border-b border-r border-slate-100 group-hover:bg-slate-50 transition-colors shadow-[1px_0_0_#f1f5f9]">
                                                            <div className="font-bold text-slate-700 flex items-center gap-2">
                                                                <span className="w-1 h-4 bg-teacher-200 rounded-full"></span>
                                                                {p.name}
                                                            </div>
                                                            <div className="text-[11px] text-slate-400 font-mono mt-1 ml-3">{p.start} - {p.end}</div>
                                                        </td>
                                                        {activeStudents.map((s, sIdx) => {
                                                            const isAvailable = isPeriodAvailable({ start: s[3], end: s[4] }, p);
                                                            const reservation = data.reservations.find(r => r[0].toString().includes(selectedDate) && r[1] === p.name && r[2] === s[0]);
                                                            return (
                                                                <td key={sIdx} className="p-2.5 text-center border-b border-r border-slate-100 last:border-r-0">
                                                                    {!isAvailable ? 
                                                                        <div className="bg-slate-50 text-slate-300 text-[10px] py-3 rounded-lg flex justify-center items-center h-full"><Icon name="minus" size={16}/></div> 
                                                                    : reservation ? (
                                                                        <button onClick={() => setModal({ type: 'reserve', student: s[0], period: p.name, data: reservation })} className="w-full py-2.5 px-2 bg-teacher-600 text-white rounded-lg text-xs font-bold shadow-md shadow-teacher-500/20 hover:bg-teacher-700 hover:shadow-lg transition-all flex flex-col items-center gap-1 group/btn">
                                                                            <span>{reservation[3]}</span>
                                                                            <span className="text-[9px] font-normal opacity-70 truncate w-full group-hover/btn:opacity-100">{reservation[4] || "詳細"}</span>
                                                                        </button>
                                                                    ) : (
                                                                        <button onClick={() => setModal({ type: 'reserve', student: s[0], period: p.name })} className="w-full py-3 bg-white border-2 border-dashed border-slate-200 text-slate-400 rounded-lg text-xs font-bold hover:border-teacher-400 hover:text-teacher-600 hover:bg-teacher-50 transition-all flex justify-center items-center gap-1">
                                                                            <Icon name="plus" size={14} /> 空き
                                                                        </button>
                                                                    )}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {passwordModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => { setPasswordModal(false); setPasswordError(""); }}></div>
                            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden relative z-10 animate-slide-down">
                                <div className="p-6 bg-teacher-600 text-white flex justify-between items-start">
                                    <h3 className="text-xl font-bold flex items-center gap-2"><Icon name="lock" /> 教員用ログイン</h3>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const pass = new FormData(e.target).get('password');
                                    if (pass === "5963") {
                                        setPasswordModal(false);
                                        setPasswordError("");
                                        setView('teacher');
                                    } else {
                                        setPasswordError("パスワードが正しくありません");
                                    }
                                }} className="p-6 space-y-5">
                                    <div className="space-y-2">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><Icon name="key" size={14}/> パスワードを入力</label>
                                        <input 
                                            name="password" 
                                            type="password" 
                                            required 
                                            autoFocus 
                                            className="w-full p-4 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:bg-white focus:border-teacher-500 focus:ring-4 focus:ring-teacher-500/10 transition font-bold text-slate-700 text-center tracking-[0.5em] text-lg" 
                                            placeholder="****" 
                                        />
                                    </div>
                                    {passwordError && (
                                        <div className="text-red-500 text-xs font-bold text-center flex items-center justify-center gap-1 animate-pulse">
                                            <Icon name="alert-triangle" size={14} /> {passwordError}
                                        </div>
                                    )}
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => { setPasswordModal(false); setPasswordError(""); }} className="flex-1 py-3.5 font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition">キャンセル</button>
                                        <button type="submit" className="flex-1 bg-teacher-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-teacher-500/30 hover:bg-teacher-700 hover:-translate-y-0.5 transition-all">ログイン</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {modal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setModal(null)}></div>
                            <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden relative z-10 animate-slide-down">
                                <div className="p-6 bg-teacher-600 text-white flex justify-between items-start">
                                    <div>
                                        <h3 className="text-xl font-bold flex items-center gap-2 mb-1"><Icon name="calendar-check" /> 予約の確定</h3>
                                        <p className="text-sm text-teacher-100 font-medium">{selectedDate} <span className="mx-2">|</span> {modal.period}</p>
                                    </div>
                                    <div className="bg-white/20 px-3 py-1 rounded-lg text-sm font-bold backdrop-blur-md">
                                        {modal.student} 様
                                    </div>
                                </div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    handlePost({ type: 'reserve', date: selectedDate, periodName: modal.period, studentName: modal.student, className: fd.get('class'), note: fd.get('note') });
                                }} className="p-6 space-y-6">
                                    <div className="space-y-2">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><Icon name="users" size={14}/> 担当クラス <span className="text-red-500">*</span></label>
                                        <select name="class" defaultValue={modal.data?.[3] || ""} required className="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:bg-white focus:border-teacher-500 focus:ring-4 focus:ring-teacher-500/10 transition font-bold text-slate-700">
                                            <option value="" disabled>選択してください</option>
                                            {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-1"><Icon name="pencil-line" size={14}/> 備考（授業名など）</label>
                                        <textarea name="note" defaultValue={modal.data?.[4] || ""} rows="3" className="w-full p-3 border border-slate-200 rounded-xl bg-slate-50 outline-none focus:bg-white focus:border-teacher-500 focus:ring-4 focus:ring-teacher-500/10 transition resize-none" placeholder="例：算数の丸付け補助をお願いします" />
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setModal(null)} className="flex-1 py-3.5 font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200 transition">キャンセル</button>
                                        <button type="submit" className="flex-1 bg-teacher-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-teacher-500/30 hover:bg-teacher-700 hover:-translate-y-0.5 transition-all">予約を確定</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 送信中のみスピナーを表示 */}
                    {loading && (
                        <div className="fixed inset-0 bg-white/60 backdrop-blur-sm z-[100] flex flex-col items-center justify-center animate-fade-in">
                            <div className="w-12 h-12 border-4 border-slate-200 border-t-teacher-600 rounded-full animate-spin shadow-lg"></div>
                            <p className="mt-4 font-bold text-slate-600 tracking-widest text-sm animate-pulse">送信中...</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
